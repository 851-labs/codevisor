name: Publish Alpha

on:
  schedule:
    - cron: "15 * * * *"
  workflow_dispatch:

permissions:
  actions: read
  contents: write

concurrency:
  group: github-release-publication
  cancel-in-progress: false

env:
  NODE_VERSION: "24.x"
  REPOSITORY: ${{ github.repository }}
  R2_BUCKET: herdman

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Resolve current Alpha build
        id: alpha
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          source_sha="$(git rev-parse HEAD)"
          run_id="$(gh run list --workflow release-candidate.yml --branch main \
            --commit "$source_sha" --status success --limit 20 \
            --json databaseId,headSha \
            --jq 'map(select(.headSha == "'"$source_sha"'"))[0].databaseId // empty')"
          if [[ -z "$run_id" ]]; then
            echo "No successful Alpha build exists for current main $source_sha."
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          provenance_dir="$RUNNER_TEMP/provenance"
          gh run download "$run_id" --name codevisor-release-provenance --dir "$provenance_dir"
          version="$(jq -r .version "$provenance_dir/release-provenance.json")"
          channel="$(jq -r .channel "$provenance_dir/release-provenance.json")"
          build="$(jq -r .build_number "$provenance_dir/release-provenance.json")"
          sha="$(jq -r .source_sha "$provenance_dir/release-provenance.json")"
          if [[ "$channel" != alpha || "$sha" != "$source_sha" || ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ || ! "$build" =~ ^[0-9]+$ ]]; then
            echo "Invalid Alpha provenance." >&2
            exit 1
          fi
          tag="v$version-alpha.$build"
          if git ls-remote --exit-code origin "refs/tags/v$version" >/dev/null 2>&1; then
            echo "Stable v$version already exists; its feed must not be replaced by Alpha."
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          existing_tag_sha="$(git ls-remote origin "refs/tags/$tag^{}" | awk '{print $1}')"
          if [[ -z "$existing_tag_sha" ]]; then
            existing_tag_sha="$(git ls-remote origin "refs/tags/$tag" | awk '{print $1}')"
          fi
          if [[ -n "$existing_tag_sha" && "$existing_tag_sha" != "$sha" ]]; then
            echo "$tag points to $existing_tag_sha instead of $sha." >&2
            exit 1
          fi
          release_complete=false
          if release_json="$(gh release view "$tag" --json assets,isDraft,isPrerelease 2>/dev/null)"; then
            expected_assets='[
              "Codevisor-macOS-arm64.zip",
              "Codevisor-macOS-x64.zip",
              "Codevisor-arm64.dmg",
              "Codevisor-x64.dmg",
              "codevisor-server-darwin-arm64.tar.gz",
              "codevisor-server-darwin-x64.tar.gz",
              "codevisor-server-linux-arm64.tar.gz",
              "codevisor-server-linux-x64.tar.gz"
            ]'
            release_complete="$(jq -r --argjson expected "$expected_assets" '
              (.isDraft == false)
              and (.isPrerelease == true)
              and (($expected - [.assets[].name]) | length == 0)
            ' <<<"$release_json")"
          fi
          feeds_complete=true
          for arch in arm64 x64; do
            feed="$RUNNER_TEMP/appcast-$arch.xml"
            if ! curl --fail --silent --show-error \
              "https://updates.codevisor.dev/appcast-$arch.xml" --output "$feed" \
              || ! node scripts/release/verify-appcast.mjs "$feed" "$build" alpha; then
              feeds_complete=false
            fi
          done
          if [[ "$release_complete" == true && "$feeds_complete" == true ]]; then
            echo "$tag and both Alpha feeds are already complete."
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "publish=true" >> "$GITHUB_OUTPUT"
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "build=$build" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - name: Download immutable Alpha artifacts
        if: steps.alpha.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ steps.alpha.outputs.run_id }}
        run: |
          mkdir -p dist/release
          for name in codevisor-macos codevisor-server-linux-x64 codevisor-server-linux-arm64 codevisor-server-macos-x64; do
            gh run download "$RUN_ID" --name "$name" --dir dist/release
          done
      - name: Generate complete Alpha changelog
        if: steps.alpha.outputs.publish == 'true'
        run: |
          node scripts/release/generate-release-notes.mjs \
            --channel alpha \
            --version "${{ steps.alpha.outputs.version }}-alpha.${{ steps.alpha.outputs.build }}" \
            --commit "${{ steps.alpha.outputs.sha }}" \
            --output dist/release/RELEASE_NOTES.md
      - name: Publish GitHub prerelease
        if: steps.alpha.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.alpha.outputs.tag }}
          SHA: ${{ steps.alpha.outputs.sha }}
        run: |
          shopt -s nullglob
          artifacts=(dist/release/*.zip dist/release/*.tar.gz dist/release/*.dmg dist/release/*.sha256)
          if ! git ls-remote --exit-code origin "refs/tags/$TAG" >/dev/null 2>&1; then
            git push origin "$SHA:refs/tags/$TAG"
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${artifacts[@]}" --clobber
            gh release edit "$TAG" --title "$TAG" \
              --notes-file dist/release/RELEASE_NOTES.md --prerelease
          else
            gh release create "$TAG" "${artifacts[@]}" \
              --verify-tag --title "$TAG" --notes-file dist/release/RELEASE_NOTES.md \
              --prerelease --latest=false
          fi
      - name: Publish Sparkle Alpha feeds
        if: steps.alpha.outputs.publish == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          R2_S3_API_ENDPOINT: ${{ secrets.CLOUDFLARE_R2_S3_API_ENDPOINT }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          scripts/release/publish-update-artifacts.sh \
            alpha \
            "${{ steps.alpha.outputs.version }}" \
            "${{ steps.alpha.outputs.tag }}" \
            "${{ steps.alpha.outputs.build }}" \
            dist/release \
            dist/release/RELEASE_NOTES.md
      - name: Verify Alpha publication
        if: steps.alpha.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ steps.alpha.outputs.tag }}" --json isPrerelease \
            --jq 'select(.isPrerelease == true)' >/dev/null
          for arch in arm64 x64; do
            feed="$RUNNER_TEMP/appcast-$arch.xml"
            curl --fail --silent --show-error \
              "https://updates.codevisor.dev/appcast-$arch.xml" --output "$feed"
            node scripts/release/verify-appcast.mjs \
              "$feed" "${{ steps.alpha.outputs.build }}" alpha
          done
