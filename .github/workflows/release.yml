name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to promote, without the leading v.
        required: true
        type: string

permissions:
  actions: read
  contents: write

concurrency:
  group: github-release-publication
  cancel-in-progress: false

env:
  NODE_VERSION: "24.x"
  REPOSITORY: ${{ github.repository }}
  R2_BUCKET: herdman

jobs:
  metadata:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      alpha_run_id: ${{ steps.release.outputs.alpha_run_id }}
      build: ${{ steps.release.outputs.build }}
      first_bridge: ${{ steps.bridge.outputs.first }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Require current main and a matching published Alpha
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          version="${INPUT_VERSION#v}"
          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "Version must be numeric semver." >&2; exit 1; }
          source_sha="$(git rev-parse HEAD)"
          main_sha="$(git ls-remote origin refs/heads/main | awk '{print $1}')"
          [[ "$source_sha" == "$main_sha" ]] || { echo "Release must run at current main." >&2; exit 1; }
          tag="v$version"
          existing_tag_sha="$(git ls-remote origin "refs/tags/$tag^{}" | awk '{print $1}')"
          if [[ -z "$existing_tag_sha" ]]; then
            existing_tag_sha="$(git ls-remote origin "refs/tags/$tag" | awk '{print $1}')"
          fi
          if [[ -n "$existing_tag_sha" && "$existing_tag_sha" != "$source_sha" ]]; then
            echo "$tag points to $existing_tag_sha instead of current main $source_sha." >&2
            exit 1
          fi
          run_id="$(gh run list --workflow release-candidate.yml --commit "$source_sha" \
            --status success --limit 20 --json databaseId,headSha \
            --jq 'map(select(.headSha == "'"$source_sha"'"))[0].databaseId // empty')"
          [[ -n "$run_id" ]] || { echo "No successful Alpha build exists for $source_sha." >&2; exit 1; }
          provenance_dir="$RUNNER_TEMP/provenance"
          gh run download "$run_id" --name codevisor-release-provenance --dir "$provenance_dir"
          provenance="$provenance_dir/release-provenance.json"
          [[ "$(jq -r .channel "$provenance")" == alpha ]] || { echo "Build is not Alpha." >&2; exit 1; }
          [[ "$(jq -r .source_sha "$provenance")" == "$source_sha" ]] || { echo "Alpha SHA mismatch." >&2; exit 1; }
          [[ "$(jq -r .version "$provenance")" == "$version" ]] || { echo "Alpha version mismatch." >&2; exit 1; }
          build="$(jq -r .build_number "$provenance")"
          [[ "$build" =~ ^[0-9]+$ ]] || { echo "Alpha build number is invalid." >&2; exit 1; }
          alpha_tag="v$version-alpha.$build"
          alpha_tag_sha="$(git ls-remote origin "refs/tags/$alpha_tag^{}" | awk '{print $1}')"
          if [[ -z "$alpha_tag_sha" ]]; then
            alpha_tag_sha="$(git ls-remote origin "refs/tags/$alpha_tag" | awk '{print $1}')"
          fi
          [[ "$alpha_tag_sha" == "$source_sha" ]] || {
            echo "Published Alpha tag $alpha_tag does not point to current main." >&2
            exit 1
          }
          release_json="$(gh release view "$alpha_tag" --json assets,isDraft,isPrerelease)"
          expected_assets='[
            "Codevisor-macOS-arm64.zip",
            "Codevisor-macOS-x64.zip",
            "Codevisor-arm64.dmg",
            "Codevisor-x64.dmg",
            "codevisor-server-darwin-arm64.tar.gz",
            "codevisor-server-darwin-x64.tar.gz",
            "codevisor-server-linux-arm64.tar.gz",
            "codevisor-server-linux-x64.tar.gz"
          ]'
          jq -e --argjson expected "$expected_assets" '
            (.isDraft == false)
            and (.isPrerelease == true)
            and (($expected - [.assets[].name]) | length == 0)
          ' <<<"$release_json" >/dev/null || {
            echo "Published Alpha release $alpha_tag is incomplete." >&2
            exit 1
          }
          for arch in arm64 x64; do
            feed="$RUNNER_TEMP/appcast-$arch.xml"
            curl --fail --silent --show-error \
              "https://updates.codevisor.dev/appcast-$arch.xml" --output "$feed"
            if [[ -n "$existing_tag_sha" ]]; then
              node scripts/release/verify-appcast.mjs "$feed" "$build" alpha \
                || node scripts/release/verify-appcast.mjs "$feed" "$build" stable
            else
              node scripts/release/verify-appcast.mjs "$feed" "$build" alpha
            fi
          done
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "alpha_run_id=$run_id" >> "$GITHUB_OUTPUT"
          echo "build=$build" >> "$GITHUB_OUTPUT"
      - name: Detect one-time Sparkle bridge
        id: bridge
        run: |
          if curl --fail --silent --show-error --head \
            https://updates.codevisor.dev/migration/sparkle-bridge.json >/dev/null 2>&1; then
            echo "first=false" >> "$GITHUB_OUTPUT"
          else
            echo "first=true" >> "$GITHUB_OUTPUT"
          fi

  build-browser-extension:
    needs: metadata
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: node scripts/release/build-browser-extension.mjs "${{ needs.metadata.outputs.version }}" dist/release
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: codevisor-browser-extension
          path: dist/release/Codevisor-Chrome-*
          if-no-files-found: error
          retention-days: 30

  publish:
    needs: [metadata, build-browser-extension]
    runs-on: ubuntu-24.04
    env:
      VERSION: ${{ needs.metadata.outputs.version }}
      TAG: ${{ needs.metadata.outputs.tag }}
      BUILD_NUMBER: ${{ needs.metadata.outputs.build }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
      - name: Download exact Alpha artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          ALPHA_RUN_ID: ${{ needs.metadata.outputs.alpha_run_id }}
        run: |
          mkdir -p dist/release
          for name in codevisor-macos codevisor-server-linux-x64 codevisor-server-linux-arm64 codevisor-server-macos-x64; do
            gh run download "$ALPHA_RUN_ID" --name "$name" --dir dist/release
          done
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: codevisor-browser-extension
          path: dist/release
      - name: Generate complete Stable changelog
        run: |
          node scripts/release/generate-release-notes.mjs \
            --channel stable --version "$VERSION" --commit "$GITHUB_SHA" \
            --output dist/release/RELEASE_NOTES.md
      - name: Publish exact Alpha bytes as Stable
        env:
          GH_TOKEN: ${{ github.token }}
          FIRST_BRIDGE: ${{ needs.metadata.outputs.first_bridge }}
        run: |
          if ! git ls-remote --exit-code origin "refs/tags/$TAG" >/dev/null 2>&1; then
            current_main="$(git ls-remote origin refs/heads/main | awk '{print $1}')"
            [[ "$current_main" == "$GITHUB_SHA" ]] || {
              echo "main advanced to $current_main after release validation at $GITHUB_SHA." >&2
              exit 1
            }
            git push origin "$GITHUB_SHA:refs/tags/$TAG"
          fi
          shopt -s nullglob
          artifacts=(dist/release/*.zip dist/release/*.tar.gz dist/release/*.dmg dist/release/*.sha256)
          latest_flag="--latest=false"
          [[ "$FIRST_BRIDGE" == true ]] && latest_flag="--latest"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${artifacts[@]}" --clobber
            edit_flags=()
            [[ "$FIRST_BRIDGE" == true ]] && edit_flags+=(--latest)
            gh release edit "$TAG" --title "$TAG" \
              --notes-file dist/release/RELEASE_NOTES.md "${edit_flags[@]}"
          else
            gh release create "$TAG" "${artifacts[@]}" \
              --verify-tag --title "$TAG" --notes-file dist/release/RELEASE_NOTES.md "$latest_flag"
          fi
      - name: Publish Stable Sparkle and Linux feeds
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          R2_S3_API_ENDPOINT: ${{ secrets.CLOUDFLARE_R2_S3_API_ENDPOINT }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          scripts/release/publish-update-artifacts.sh \
            stable "$VERSION" "$TAG" "$BUILD_NUMBER" dist/release dist/release/RELEASE_NOTES.md
          if [[ "${{ needs.metadata.outputs.first_bridge }}" == true ]]; then
            marker="$(mktemp)"
            jq -n --arg version "$VERSION" --arg tag "$TAG" \
              '{version: $version, tag: $tag, frozen: true}' > "$marker"
            aws s3 cp "$marker" "s3://$R2_BUCKET/migration/sparkle-bridge.json" \
              --endpoint-url "$R2_S3_API_ENDPOINT" \
              --content-type application/json \
              --cache-control "public, max-age=31536000, immutable"
          fi
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          [[ -n "$TAP_TOKEN" ]] || { echo "HOMEBREW_TAP_TOKEN is required." >&2; exit 1; }
          tap_dir="$RUNNER_TEMP/homebrew-tap"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/851-labs/homebrew-tap.git" "$tap_dir"
          VERSION="$VERSION" REPOSITORY="$REPOSITORY" ARTIFACT_DIR=dist/release \
            node scripts/release/update-homebrew-tap.mjs "$tap_dir"
          cd "$tap_dir"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || { git commit -m "Update Codevisor to $VERSION"; git push; }
      - name: Verify Stable publication
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$TAG" --json body,isPrerelease \
            --jq 'select(.isPrerelease == false and (.body | length > 0))' >/dev/null
          curl --fail --silent --show-error https://updates.codevisor.dev/server/stable.json \
            | jq -e --arg version "$VERSION" '.version == $version' >/dev/null
          for arch in arm64 x64; do
            feed="$RUNNER_TEMP/appcast-$arch.xml"
            curl --fail --silent --show-error \
              "https://updates.codevisor.dev/appcast-$arch.xml" --output "$feed"
            node scripts/release/verify-appcast.mjs "$feed" "$BUILD_NUMBER" stable
          done
