name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, without the leading v. Required when not running from a tag."
        required: false
        type: string
      macos_runner:
        description: "macOS runner label. Use an image with the Xcode SDK required by the project."
        required: false
        default: "macos-latest"
        type: string

permissions:
  contents: write

env:
  BUN_VERSION: "1.3.13"
  NODE_VERSION: "24.x"
  REPOSITORY: ${{ github.repository }}
  R2_BUCKET: "herdman"
  R2_PUBLIC_BASE_URL: "https://pub-d2d6eb72b71c4986a742c0527774c9f0.r2.dev/releases/herdman"
  WRANGLER_VERSION: "4.90.1"

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Resolve release version
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
          else
            version="${INPUT_VERSION#v}"
            if [[ -z "$version" ]]; then
              echo "version input is required when the workflow is not running from a v* tag" >&2
              exit 1
            fi
            tag="v$version"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  build-server-linux:
    needs: metadata
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build Linux server archive
        run: scripts/release/build-server-archive.sh "${{ needs.metadata.outputs.version }}" dist/release
      - uses: actions/upload-artifact@v4
        with:
          name: herdman-server-linux
          path: |
            dist/release/herdman-server-*.tar.gz
            dist/release/herdman-server-*.tar.gz.sha256
          if-no-files-found: error

  build-macos:
    needs: metadata
    runs-on: ${{ inputs.macos_runner || vars.HERDMAN_MACOS_RUNNER || 'macos-latest' }}
    env:
      APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      HERDMAN_BUILD_NUMBER: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Import Developer ID certificate
        if: env.APPLE_CERTIFICATE_BASE64 != ''
        shell: bash
        env:
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          certificate_path="$RUNNER_TEMP/apple-certificate.p12"
          keychain_path="$RUNNER_TEMP/herdman-signing.keychain-db"

          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$certificate_path"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$certificate_path" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$keychain_path"
          security list-keychains -d user -s "$keychain_path" $(security list-keychains -d user | tr -d '"')
      - name: Prepare App Store Connect API key
        if: env.APP_STORE_CONNECT_API_KEY_BASE64 != ''
        shell: bash
        run: |
          if [[ -z "$APP_STORE_CONNECT_API_KEY_ID" || -z "$APP_STORE_CONNECT_ISSUER_ID" ]]; then
            echo "APP_STORE_CONNECT_API_KEY_ID and APP_STORE_CONNECT_ISSUER_ID are required when APP_STORE_CONNECT_API_KEY_BASE64 is set." >&2
            exit 1
          fi

          api_key_path="$RUNNER_TEMP/AuthKey_$APP_STORE_CONNECT_API_KEY_ID.p8"
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode > "$api_key_path"
          chmod 600 "$api_key_path"
          echo "APP_STORE_CONNECT_API_KEY_PATH=$api_key_path" >> "$GITHUB_ENV"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run release checks
        run: bun run check
      - name: Build macOS app archive
        run: scripts/release/build-macos-app.sh "${{ needs.metadata.outputs.version }}" dist/release
      - name: Build macOS server archive
        run: scripts/release/build-server-archive.sh "${{ needs.metadata.outputs.version }}" dist/release
      - uses: actions/upload-artifact@v4
        with:
          name: herdman-macos
          path: |
            dist/release/HerdMan-macOS.zip
            dist/release/HerdMan-macOS.zip.sha256
            dist/release/herdman-server-*.tar.gz
            dist/release/herdman-server-*.tar.gz.sha256
          if-no-files-found: error

  publish:
    needs:
      - metadata
      - build-server-linux
      - build-macos
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.metadata.outputs.version }}
      TAG: ${{ needs.metadata.outputs.tag }}
      GH_TOKEN: ${{ github.token }}
      TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist/release
          merge-multiple: true
      - name: Publish GitHub release assets
        shell: bash
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/release/*.zip dist/release/*.tar.gz --clobber
          else
            gh release create "$TAG" dist/release/*.zip dist/release/*.tar.gz \
              --target "$GITHUB_SHA" \
              --title "HerdMan $VERSION" \
              --generate-notes
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Upload R2 release assets
        shell: bash
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [[ -z "$CLOUDFLARE_ACCOUNT_ID" || -z "$CLOUDFLARE_API_TOKEN" ]]; then
            echo "CLOUDFLARE_ACCOUNT_ID and CLOUDFLARE_API_TOKEN are required for R2 release uploads." >&2
            exit 1
          fi

          npm install --global "wrangler@$WRANGLER_VERSION"
          scripts/release/upload-r2-artifacts.sh "$VERSION" dist/release
      - name: Update Homebrew tap
        shell: bash
        run: |
          if [[ -z "$TAP_TOKEN" ]]; then
            echo "HOMEBREW_TAP_TOKEN is not set; skipping tap update." >&2
            exit 0
          fi

          tap_dir="$RUNNER_TEMP/homebrew-tap"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/851-labs/homebrew-tap.git" "$tap_dir"
          VERSION="$VERSION" REPOSITORY="$REPOSITORY" ARTIFACT_DIR="dist/release" ARTIFACT_BASE_URL="$R2_PUBLIC_BASE_URL/v#{version}" \
            node scripts/release/update-homebrew-tap.mjs "$tap_dir"

          cd "$tap_dir"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/herdman.rb Formula/herdman-server.rb
          if git diff --cached --quiet; then
            echo "Homebrew tap is already up to date."
          else
            git commit -m "Update HerdMan to $VERSION"
            git push
          fi
