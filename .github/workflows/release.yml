name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release, without the leading v.
        required: true
        type: string

permissions:
  actions: read
  contents: write

concurrency:
  # Serialize stable publication with the hourly prerelease publisher so a
  # scheduler run cannot create an RC after this workflow tags the final.
  group: github-release-publication
  cancel-in-progress: false

env:
  NODE_VERSION: "24.x"
  REPOSITORY: ${{ github.repository }}
  # R2 is a frozen compatibility bridge after the first release from this
  # workflow. The existing bucket name cannot be changed.
  R2_BUCKET: "herdman"

jobs:
  metadata:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      rc_run_id: ${{ steps.release.outputs.rc_run_id }}
      include_compatibility_artifacts: ${{ steps.bridge.outputs.include }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
      - name: Require the tag to match current main and a successful RC
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          version="${INPUT_VERSION#v}"
          tag="v$version"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must be numeric semantic versions (vMAJOR.MINOR.PATCH)." >&2
            exit 1
          fi

          git fetch origin main --no-tags
          source_sha="$(git rev-parse HEAD)"
          main_sha="$(git rev-parse origin/main)"
          if [[ "$source_sha" != "$main_sha" || "$source_sha" != "$GITHUB_SHA" ]]; then
            echo "Release source is $source_sha, but current origin/main is $main_sha." >&2
            echo "Dispatch the release from current main HEAD." >&2
            exit 1
          fi
          existing_tag_sha="$(git ls-remote origin "refs/tags/$tag^{}" | awk '{print $1}')"
          if [[ -z "$existing_tag_sha" ]]; then
            existing_tag_sha="$(git ls-remote origin "refs/tags/$tag" | awk '{print $1}')"
          fi
          if [[ -n "$existing_tag_sha" && "$existing_tag_sha" != "$source_sha" ]]; then
            echo "$tag already exists at $existing_tag_sha; release tags are never moved." >&2
            exit 1
          fi

          rc_run_id="$(gh run list \
            --workflow release-candidate.yml \
            --commit "$source_sha" \
            --status success \
            --limit 10 \
            --json databaseId,headSha \
            --jq 'map(select(.headSha == "'$source_sha'"))[0].databaseId // empty')"
          if [[ -z "$rc_run_id" ]]; then
            echo "No successful release-candidate run exists for $source_sha." >&2
            exit 1
          fi

          provenance_dir="$RUNNER_TEMP/codevisor-rc-provenance"
          gh run download "$rc_run_id" \
            --name codevisor-release-provenance \
            --dir "$provenance_dir"
          rc_sha="$(jq -r .source_sha "$provenance_dir/release-provenance.json")"
          rc_version="$(jq -r .version "$provenance_dir/release-provenance.json")"
          rc_channel="$(jq -r .channel "$provenance_dir/release-provenance.json")"
          if [[ "$rc_sha" != "$source_sha" || "$rc_version" != "$version" || "$rc_channel" != "rc" ]]; then
            echo "RC provenance does not match release $tag at $source_sha." >&2
            jq . "$provenance_dir/release-provenance.json" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "rc_run_id=$rc_run_id" >> "$GITHUB_OUTPUT"
          echo "Releasing $tag at current main HEAD $source_sha from RC run $rc_run_id"
      - name: Check whether the R2 bridge still needs a universal app
        id: bridge
        shell: bash
        run: |
          include=true
          if curl --fail --silent --show-error --head \
            https://pub-d2d6eb72b71c4986a742c0527774c9f0.r2.dev/releases/codevisor/bridge.json \
            >/dev/null 2>&1; then
            include=false
          fi
          echo "include=$include" >> "$GITHUB_OUTPUT"

  build:
    needs: metadata
    uses: ./.github/workflows/build-release-artifacts.yml
    with:
      version: ${{ needs.metadata.outputs.version }}
      channel: stable
      source_sha: ${{ github.sha }}
      reuse_run_id: ${{ needs.metadata.outputs.rc_run_id }}
      artifact_retention_days: 30
      include_compatibility_artifacts: ${{ needs.metadata.outputs.include_compatibility_artifacts == 'true' }}
    secrets:
      APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}

  publish:
    needs: [metadata, build]
    runs-on: ubuntu-24.04
    env:
      VERSION: ${{ needs.metadata.outputs.version }}
      TAG: ${{ needs.metadata.outputs.tag }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Download macOS release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: codevisor-macos
          path: dist/release
      - name: Download x64 Linux server release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: codevisor-server-linux-x64
          path: dist/release
      - name: Download ARM Linux server release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: codevisor-server-linux-arm64
          path: dist/release
      - name: Download Intel server release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: codevisor-server-macos-x64
          path: dist/release
      - name: Determine whether this is the one-time R2 bridge release
        id: bridge
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          R2_S3_API_ENDPOINT: ${{ secrets.CLOUDFLARE_R2_S3_API_ENDPOINT }}
        run: |
          bridge_url="https://pub-d2d6eb72b71c4986a742c0527774c9f0.r2.dev/releases/codevisor/bridge.json"
          if bridge_json="$(curl --fail --silent --show-error "$bridge_url" 2>/dev/null)"; then
            echo "required=false" >> "$GITHUB_OUTPUT"
            bridge_version="$(jq -r .version <<<"$bridge_json")"
            echo "version=${bridge_version#v}" >> "$GITHUB_OUTPUT"
            echo "R2 already contains its frozen compatibility bridge."

            # Apps from the brief pre-R2 era query GitHub latest but hardcode
            # this asset name. Reattach the frozen bridge app to every latest
            # release so a dormant install can still cross the migration years
            # later; modern users continue to download the small split assets.
            legacy_url="https://pub-d2d6eb72b71c4986a742c0527774c9f0.r2.dev/releases/herdman/v${bridge_version#v}/HerdMan-macOS.zip"
            curl --fail --silent --show-error --location \
              "$legacy_url" \
              --output dist/release/HerdMan-macOS.zip
            shasum -a 256 dist/release/HerdMan-macOS.zip | awk '{print $1}' \
              > dist/release/HerdMan-macOS.zip.sha256
          else
            if [[ -z "$AWS_ACCESS_KEY_ID" || -z "$AWS_SECRET_ACCESS_KEY" || -z "$R2_S3_API_ENDPOINT" ]]; then
              echo "R2 credentials are required for the one-time compatibility bridge." >&2
              exit 1
            fi
            echo "required=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            cp dist/release/Codevisor-macOS.zip dist/release/HerdMan-macOS.zip
            shasum -a 256 dist/release/HerdMan-macOS.zip | awk '{print $1}' \
              > dist/release/HerdMan-macOS.zip.sha256
            echo "This release will become the permanent R2 bridge."
          fi
      - name: Publish GitHub release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing_tag_sha="$(git ls-remote origin "refs/tags/$TAG^{}" | awk '{print $1}')"
          if [[ -z "$existing_tag_sha" ]]; then
            existing_tag_sha="$(git ls-remote origin "refs/tags/$TAG" | awk '{print $1}')"
          fi
          main_sha="$(git ls-remote origin refs/heads/main | awk '{print $1}')"
          if [[ -n "$existing_tag_sha" && "$existing_tag_sha" != "$GITHUB_SHA" ]]; then
            echo "$TAG already points to $existing_tag_sha, not $GITHUB_SHA." >&2
            exit 1
          fi
          if [[ -z "$existing_tag_sha" && "$main_sha" != "$GITHUB_SHA" ]]; then
            echo "main advanced to $main_sha after this release started at $GITHUB_SHA." >&2
            echo "Wait for that HEAD's RC and dispatch a new version." >&2
            exit 1
          fi
          if [[ -z "$existing_tag_sha" ]]; then
            git push origin "$GITHUB_SHA:refs/tags/$TAG"
          fi
          shopt -s nullglob
          artifacts=(
            dist/release/*.zip
            dist/release/*.tar.gz
            dist/release/*.dmg
            dist/release/*.sha256
          )
          if [[ "${#artifacts[@]}" -eq 0 ]]; then
            echo "No release artifacts were downloaded." >&2
            exit 1
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${artifacts[@]}" --clobber
            gh release edit "$TAG" --title "$TAG" --latest
          else
            gh release create "$TAG" "${artifacts[@]}" \
              --verify-tag \
              --title "$TAG" \
              --generate-notes \
              --latest
          fi
      - name: Verify public GitHub release assets
        shell: bash
        run: |
          expected=(
            Codevisor-macOS-arm64.zip
            Codevisor-macOS-x64.zip
            Codevisor-arm64.dmg
            Codevisor-x64.dmg
            codevisor-server-darwin-arm64.tar.gz
            codevisor-server-darwin-x64.tar.gz
            codevisor-server-linux-arm64.tar.gz
            codevisor-server-linux-x64.tar.gz
          )
          expected+=(HerdMan-macOS.zip)
          if [[ "${{ steps.bridge.outputs.required }}" == "true" ]]; then
            expected+=(Codevisor-macOS.zip)
          fi
          for name in "${expected[@]}"; do
            for asset in "$name" "$name.sha256"; do
              url="https://github.com/$REPOSITORY/releases/download/$TAG/$asset"
              curl --fail --silent --show-error --location --head "$url" >/dev/null
              echo "Verified $url"
            done
          done
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Update Homebrew tap to GitHub assets
        shell: bash
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [[ -z "$TAP_TOKEN" ]]; then
            echo "HOMEBREW_TAP_TOKEN is required for stable releases." >&2
            exit 1
          fi
          tap_dir="$RUNNER_TEMP/homebrew-tap"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/851-labs/homebrew-tap.git" "$tap_dir"
          VERSION="$VERSION" REPOSITORY="$REPOSITORY" ARTIFACT_DIR="dist/release" \
            node scripts/release/update-homebrew-tap.mjs "$tap_dir"
          cd "$tap_dir"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Homebrew tap is already up to date."
          else
            git commit -m "Update Codevisor to $VERSION"
            git push
          fi
      - name: Publish and freeze the R2 compatibility bridge
        if: steps.bridge.outputs.required == 'true'
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          R2_S3_API_ENDPOINT: ${{ secrets.CLOUDFLARE_R2_S3_API_ENDPOINT }}
          R2_BRIDGE_MODE: "1"
        run: scripts/release/upload-r2-artifacts.sh "$VERSION" dist/release
      - name: Verify updater sources
        shell: bash
        run: |
          api_tag=""
          for attempt in {1..12}; do
            api_tag="$(curl --fail --silent --show-error \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "https://api.github.com/repos/$REPOSITORY/releases/latest" | jq -r .tag_name)"
            [[ "$api_tag" == "$TAG" ]] && break
            echo "GitHub latest reports $api_tag; retrying ($attempt/12)."
            sleep 10
          done
          if [[ "$api_tag" != "$TAG" ]]; then
            echo "GitHub latest reports $api_tag, expected $TAG." >&2
            exit 1
          fi
          if [[ "${{ steps.bridge.outputs.required }}" == "true" ]]; then
            bridge_version=""
            for attempt in {1..12}; do
              bridge_version="$(curl --fail --silent --show-error \
                https://pub-d2d6eb72b71c4986a742c0527774c9f0.r2.dev/releases/codevisor/latest.json \
                | jq -r .version)"
              [[ "${bridge_version#v}" == "$VERSION" ]] && break
              echo "R2 bridge reports $bridge_version; retrying ($attempt/12)."
              sleep 10
            done
            if [[ "${bridge_version#v}" != "$VERSION" ]]; then
              echo "R2 bridge reports $bridge_version, expected $VERSION." >&2
              exit 1
            fi
          fi
